body:
  text: 睡虎地秦墓竹簡日書甲種除十一月斗十二月須正月營二月奎三月胃四月畢五月東六月柳七月張八月角九月氐十月心濡子丑寅卯辰巳午未申酉戌亥贏丑寅卯辰巳午未申酉戌亥子建寅卯辰巳午未申酉戌亥子丑陷卯辰巳午未申酉戌亥子丑寅彼辰巳午未申酉戌亥子丑寅卯平巳午未申酉戌亥子丑寅卯辰寧午未申酉戌亥子丑寅卯辰巳空未申酉戌亥子丑寅卯辰巳午坐申西戌亥子丑寅卯辰巳午未蓋酉戌亥子丑寅卯辰巳午未申成戌亥子丑寅卯辰巳午未申酉甬亥子丑寅卯辰巳午未申酉戌凡不可用者秋三月辰冬三月未春三月戌夏三月亥結日作事不成以祭閵生子毋弟有弟必死以寄人寄人必奪主室陽日百事順成邦郡得年小夫四成以蔡上下羣神鄉之乃盈志交日利以實事鑿井吉以祭門行行水吉害日利以除凶兌不羊祭門行吉以祭最眾必亂者陰日利以家室祭祀家子取婦入材大吉以見君上數達毋咎達日利以行帥出正見人以祭上下皆吉生子男吉女必出於邦外陽日利以建野外可以田邋以亡不得門外害日不可以行作之四方野外必耦寇盗見兵外陰日利以祭祀作事入材皆吉不可以之野外可名曰𣪠日以生子窶孤人不得利以兌明組百不羊夬光日利以登高飲食邋四方野外居有食行有得以生子男女必美秀日利以起大事大祭吉寇車折衣常服帶吉生子吉弟凶秦除正月建寅除卯盈辰平巳定午摯未柀申危酉成戌收亥開子閉丑二月建卯除辰盈巳平午定未執申柀酉危戌成亥收子開丑閉寅三月建辰除巳盈午平未定申執酉柀戌危亥成子收丑開寅閉卯四月建巳除午盈未平申定酉摯戌柀亥危子成丑收寅開卯閉辰五月建午除未盈申平酉定戌摯亥柀子危丑成寅收卯開辰閉巳六月建未除申盈酉平戌定亥摯子柀丑危寅成卯收辰開巳閉午七月建申除酉盈戌平亥定子摯丑柀寅危卯成辰收已開午閉未八月建酉除戌盈亥平子定丑摯寅柀卯危辰成巳收午開未閉申九月建戌除亥盈子平丑定寅摯卯柀辰危巳成午收未開申閉酉十月建亥除子盈丑平寅定卯摯辰柀巳危午成未收申開酉閉戌十一月建子除丑盈寅平卯定辰摯巳柀午危未成申收酉開戌閉亥十二月建丑除寅盈卯平辰定巳摯午柀未危申成酉收戌開亥閉子建日良日也可以為嗇夫可以祠利棗不利莫可以入人始寇乘車有為也吉除日臣妾亡不得有𤺄病不死利市責徹除地飲樂攻盗不可以執盈日可以築閒牢可以產可以築宮室為嗇夫有疾難起平日可以取妻入人起事定日可以臧為官府室祠摯日不可以行以亡必摯而入公而止柀日毋可以有為也危日可以責摯攻𣪠成日可以謀事起興大事收日可以入人民馬牛禾粟入室取妻及它物開日亡者不得請謁得言盗得閉日可以劈决池入臣徒馬牛它生禾良日己亥癸亥五酉五丑禾忌日稷龍寅秫丑稻亥麥子菽荅卯麻辰葵癸亥各常忌不可種之及初穫出入之辛卯不可以初穫禾囷良日甲午乙未乙巳為囷大吉稷辰正月二月子秀丑戌正陽寅酉危陽卯敫辰申巳未陰午徹亥結三月四月寅秀卯子正陽辰亥危陽巳敫午戌未酉陰申徹丑結五月六月辰秀巳寅正陽午丑危陽未敫申子酉亥陰戌徹卯結七月八月午秀未辰正陽申卯危陽酉敫戌寅亥丑陰子徹巳結九月十月申秀酉午正陽戌巳危陽亥敫子辰丑卯陰寅徹未結十一月十二月戌秀亥申正陽子未危陽丑敫寅午卯巳陰辰徹酉結秀是胃重光利野戰必得侯王以生子既美且長有賢等利見人及畜畜生可取婦家女衣常利祠飲食歌樂臨官立正相宜也利徙官免復事𣪠亟出雖雨齊不可復室蓋屋正月以朔旱歲善有兵正陽是胃滋昌小事果成大事又慶它毋小大盡吉利為嗇夫是胃三昌𠈲時以戰命胃三勝以祠吉有為也美惡自成生子吉可葬貍雨齊亡者不得正月以朔歲善毋兵危陽是胃不成行以為嗇夫必三徙官徙官自如其後乃昌免復事亡人自歸又疾不死死者又毀利解事不可殺不可取婦家女不可見人生子子死以雨半日正月以朔多雨歲半入毋兵敫是胃又小逆毋大央可以穿井行水蓋屋飲樂外除亡者不得不可取婦家女出入貨及生不可臨官飲食樂祠祀以生子子不產取婦家女兩寡相當正月以朔多雨歲善而柀不產有兵是胃其羣不𢳎以辭不合私公必閉有為不成亡者得利弋邋報讎攻軍韋城始殺可取不可鼠不可飲食哥樂利以祠外以生子吉𣪠亟出雖雨見日正月以朔旱又歲又小兵毋大兵陰是胃乍陰乍陽先辱而後又慶利居室入貨及生可取婦家女葬貍以祠祀飲食哥樂吉為嗇夫久以𣪠不免生子男女為盗不可入寄者正月以朔多雨歲中毋兵多盗旦雨夕齊夕雨不齊徹是胃六甲相逆利以戰伐不可以見人取婦家女出入貨及生不可祠祀哥樂以生子子死亡者得不得必死𣪠久不已不可又為也可葬貍雨日正月以朔多雨歲善毋兵結是胃利以出貨不可以入可以取婦家女以免弗復𣪠久不已不可又為也而可以葬貍雨日也正月以朔歲中又兵又雨衣裚衣丁丑媚人丁亥靈丁巳安於身癸酉多衣毋以楚九月己未台被新衣衣手必死弦望及五辰不可以興樂五丑不可以巫啻以殺巫減鼠襄戶見之入月一日二日吉三日不吉四日五日吉六日不吉七日八日吉九日恐廿二日廿三日吉廿四日恐廿五日廿六日吉廿七日恐廿八日廿九日吉葬日子卯巳酉戌是胃男日午未申丑亥辰是胃女日女日死女日葬必復之男子亦然凡丁丑不可以葬葬必參玄戈十月心危營室大凶心尾致死畢此巂大吉張翼少吉柖榣𣪠未玄戈𣪠尾十一月斗婁虛大凶角房致死胃大吉柳七星少吉柖榣𣪠午玄戈𣪠心十二月須女斗牽牛大凶角犺致死奎婁大吉東井輿鬼少吉柖榣𣪠巳玄戈𣪠房正月營室心大凶張翼致死危營室大吉畢此巂少吉柖榣𣪠辰玄戈𣪠翼二月奎牴房大凶七星致死須女虛大吉胃參少吉柖榣𣪠卯玄戈𣪠張三月胃角犺大凶東井輿鬼致死斗牽牛大吉奎婁少吉柖榣𣪠寅玄戈𣪠七星四月畢張翼大凶畢此巂致死心尾大吉危營室少吉柖榣𣪠丑玄戈𣪠此巂五月東井七星大凶胃參致死角房大吉須女虛少吉柖榣𣪠子玄戈𣪠畢六月柳東井輿鬼大凶奎婁致死角犺大吉斗牽牛少吉柖榣𣪠亥玄戈𣪠茅七月張畢此巂大凶危營室致死張翼大吉心尾少吉柖榣𣪠戌玄戈𣪠營室八月角胃參大凶須女虛致死柳七星大吉角房少吉柖榣𣪠酉玄戈𣪠危九月牴奎婁大凶斗牽牛致死東井輿鬼大吉張翼少吉柖榣𣪠申玄戈𣪠虛正月五月九月北徙大吉東北少吉若以是月殹東徙𣪠東南刺離南精西南室毀西困西北辱二月六月十月東徙大吉東南少吉若以是月殹南徙𣪠西南刺離西精西北𣪠北困辱三月七月十一月南徙大吉西南少吉若以是月殹西徙𣪠西北刺離北精東毀東北困東南辱九四月八月十二月西徙大吉西北少吉若以是月殹北徙𣪠東北刺離南精東南毀南困辱𣪠者死殹刺者室人妻子父母分離精者困者辱者不孰而為人矢此所胃艮山禹之離日也從上右方數朔之初日及枳各一日數之而復從上數與枳刺夾艮山之胃離日離日不可以家女取婦及入人民畜生唯利以分異離日不可以行行不反戊午去父母同生異者焦窶居𤵸丙申以就同居必窶毋以辛酉入寄者入寄者必代居其室己巳入寄者不出歲亦寄焉入客戊辰己巳辛酉辛卯己未庚午虛四徹不可入客寓人及臣妾必代居室歲刑夷八月獻馬歲在東方以北大羊東旦亡南遇英西數反其鄉夏夷九月中夕歲在南方以東大羊南旦亡西禺英北數反其鄉紡月十月屈夕歲在西方以南大羊西旦亡北禺英東數反其鄉七月爨月援夕歲在北方以西大羊北旦亡東禺英南數反其鄉十月楚冬夕日六夕七十一月楚屈夕日五夕十一十二月楚援夕日六夕十正月楚刑夷日七夕九二月楚夏杘日八夕八三月楚紡月日九夕七四月楚七月日十夕六五月楚八月日十一夕五六月楚九月日十夕六七月楚十月日九夕七八月楚爨月日八夕八九月楚鬳馬日七夕九星角利祠及行吉不可蓋屋取妻妻妬生子為吏亢祠為門行吉可入貨生子必有爵牴祠及行出入貨吉取妻妻貧生子巧房取婦家女出入貨及祠吉可為室屋生子富心不可祠及行凶可以行水取妻妻悍生子人愛之尾百事凶以祠必有敫不可取妻生子貧箕不可祠百事凶取妻妻多舌生子貧富半斗利祠及行賈賈市吉取妻妻為巫生子不盈三歲死可以攻伐牽牛可祠及行吉不可殺牛以結者不擇以入牛老一生子為大夫須女祠賈市取妻吉生子三月死不死毋晨虛百事凶以結者易擇亡者不得取妻妻不到以生子毋它同生危百事凶生子老為人治也有數詣風雨營室利祠不可為室及入之以取妻妻不寧生子為大吏東辟不可行百事凶以生子不完不可為它事奎祠及行吉以取妻女子愛而口臭生子為吏婁利祠及行百事吉以取妻男子愛生子亡者人意之胃利入禾粟及為囷倉吉以取妻妻愛生子必使人卯邋賈市吉不可食六畜以生子喜斲畢以邋置罔及為門吉以死必二人取妻必二妻不可食六畜生子𤵙亡者得此巂百事凶可以敫人攻讎生子為正參百事吉取妻吉唯生子不吉東井百事凶以死必五人死以殺生必五生死取妻多子生子旬而死可以為土事輿鬼祠及行吉以生子𤵸可以送鬼柳百事吉取妻吉以生子肥可以寇可請謁可田邋七星百事凶利以垣生子樂不可出女張百事吉取妻吉以生子為邑桀翼利行不可臧以祠必有火起取妻必棄生子男為見女為巫軫乘車馬衣常取妻吉以生子必駕可入貨病甲乙有疾父母為祟得之於肉從東方來裹以桼器戊己病庚有閒辛酢若不酢煩居東方歲在東方青色死丙丁有疾王父為祟得之赤肉雄鷄酉庚辛病壬有閒癸酢若不酢煩居南方歲在南方赤色死戊己有疾巫堪行王母為祟得之於黃色索魚堇酉壬癸病甲有閒乙酢若不酢煩居邦中歲在西方黃色死庚辛有疾外鬼傷死為祟得之犬肉鮮卵白色甲乙病丙有閒丁酢若不酢煩居西方歲在西方白色死壬癸有疾母逢人外鬼為祟得之於酉脯脩節肉丙丁病戊有閒己酢若不酢煩居北方歲在北方黑色死祠父母良日乙丑乙亥丁丑亥辛丑癸亥不出三月有大得三乃五祠行良日庚申是天昌不出三歲必有大得人良日乙丑乙酉乙巳己丑己酉己巳辛丑辛酉辛巳癸酉癸巳其忌丁巳丁未戊戌戊辰戊子不利出入人男子龍庚寅女子龍丁馬良日乙丑乙酉乙巳乙亥己丑己酉己亥己巳辛丑酉辛巳辛亥癸丑癸酉癸巳庚辰其忌丙子丙午丙寅丁巳丁未戊寅戊戌戊子庚寅辛卯牛良日庚辰庚申庚午辛酉壬戌壬申壬午癸酉甲辰甲申甲寅其忌己丑己未己巳己卯戊寅戊戌戊子己巳戊午不可殺牛羊良日乙丑乙酉乙巳己酉己丑己巳辛酉辛丑辛巳庚辰庚寅其忌壬戌癸亥癸酉春三月庚辰可以筑羊卷即入之羊必千豬良日庚申庚辰壬辰壬申甲申甲辰己丑己酉己巳其忌乙亥乙巳乙未丁巳丁未市良日戊寅戊辰戊戌申戌利初市吉犬良日癸酉癸未甲申甲辰甲午庚辰庚午辛酉壬辰其忌己丑己巳己未己卯乙巳戊子戊寅戊戌有妻子毋以己巳壬寅殺犬有央鷄良日甲辰乙巳丙午戊辰丙辰可以出入鷄鷄忌日辛未庚寅辛巳勿以出入鷄金錢良日甲申乙巳申不可出貨午不可入貨貨必後絕蠶良日庚午庚子甲午五辰可以入五丑五酉庚午可以出啻春三月啻為室申剽卯殺辰四廢庚辛夏三月啻為室寅剽午殺未