貴辛卯生子吉及㝅壬辰生子武而好衣劍癸巳生子㝅甲午生子武有力少孤乙未生子有疾少孤後富丙申生子好家室丁酉生子耆酒戊戌生子好田野邑屋己亥生子㝅庚子生子少孤污辛丑生子有冬終壬寅生子不吉女子為也醫癸卯生子不吉甲辰生子㝅且武而利弟乙巳生子吉丙午生子耆酉而疾後富丁未生子不吉毋母必賞𣪠囚戊申生子寵事君己酉生子㝅有商庚戌生子武而貧辛亥生子不吉壬子生子恿癸丑生子好水少疾必為吏甲寅生子必為吏乙卯生子要不丙辰生子有疵於𦡊而恿丁巳生子㝅而美有𢼕戊午生子耆酉及田邋己未生子吉庚申生子良辛酉生子不吉壬戌生子好家室癸亥生子毋冬甲子生子少孤衣污乙丑生子武以攻巧丙寅生子武以聖丁卯生子不正乃有疵前戊辰生子有寵己巳生子鬼必為人臣妾庚午生子貧有力先冬辛未生子肉食壬申生子聞癸酉生子先冬人字人字其日在首富難勝殹夾頸者貴在奎者富在掖者愛在手者巧盗在足下者賤在外者奔亡女子以巳字不復字戊子以有求也必得之雖求頯啻必得丙寅以求人得之取妻取妻龍日丁巳癸丑辛酉辛亥乙酉及春之未戌秋丑辰冬戌亥丁丑己丑取妻不吉戊申己酉牽牛以取織女不果三棄作女子月生一日十一日廿一日女果以死以作女子事必死毋以戌亥家子取婦是謂相吏子朝見有告聽晏見有告不聽晝見有美言日虒見令復見之夕見有美言丑朝見有奴晏見有美言晝見禺奴日虒見有告聽夕見有惡言寅朝見有奴晏見說晝見不得復日虒見不言得夕見有告聽卯朝見喜請命許晏見說晝見有告聽日虒見請命許夕見有奴辰朝見有告聽晏見請命許晝見請命許日虒見有告不聽夕見請命許巳朝見不說晏見有告聽晝見有告不聽日虒見有告禺奴夕見有後言午朝見不詒晏見百事不成晝見有告聽日虒見造許夕見說申朝見禺奴晏見得語晝見不說日虒見有後言夕見請命許戌朝見有告聽晏見造許晝見得語日虒見請命許夕見有惡言亥朝見有後言晏見不詒晝見令復見之日虒見有惡言夕見令復見之入官良日丁丑入官吉必七徙寅入官吉戌入官吉亥入官吉申入官不計去酉入官有罪卯入官兇未午辰入官必辱去己丑以見王公必有拜也春三月季庚辛夏三月季壬癸秋三月季甲乙冬三月季丙丁此大敗日取妻不終蓋屋燔行傅毋可有為日衝癸丑戊午己末禹以取梌山之女日也不棄必以子死戊申己酉牽牛以取織女而不果不出三歲棄若亡壬辰癸巳婦以出夫先死不出二歲庚辰辛巳敝毛之士以取妻不死棄凡取妻出女之日冬三月奎婁吉以奎夫愛妻以婁妻愛夫壬申癸酉天以震高山以取妻不居不吉甲子午庚辰丁巳不可取妻家子甲寅之旬不可取妻毋子雖有毋男戌興亥是胃分離日不可取妻取妻不終死若棄子寅卯巳酉戌為牡日丑辰申午未亥為牝牝日以葬必復之十二月正月七月八月為牡月三月四月九月十月為牝月牝月牡日取妻吉直參以出女室必盡直營室以出女父母必從居直牽牛須女出女父母有咎中春軫角中夏參東井中秋奎東辟中冬竹斗以取妻棄凡參翼軫以出女丁巳以出女皆棄之以己丑酉巳不可家女取妻交徙人也可也月生五日曰杵九日曰舉十二日曰見莫取十四日奊訽十五日曰臣代主代主及奊訽不可取妻夢人有惡瞢䁷乃繹髮西北面坐之曰皋敢告壐某有惡瞢走歸之所強飲強食賜某大幅非錢乃布非繭乃絮則止矣凡宇最邦之高貴貧宇最邦之下富而𤵸宇四旁高中央下富宇四旁下中央高貧宇北方高南方下毋寵宇南方高北方下利賈市宇東方高西方下女子為正宇有要不窮必刑宇中有谷不吉宇右長左短吉宇左長女子為正宇多於西南之西富宇多於西北之北絕後宇多於東北之北安宇多於東北出逐宇多於東南富女子為正道周環宇不吉祠木臨宇不吉垣東方高西方之垣君子不得志為池西南富為池正北不利其母水𤅋西出貧有女子言水𤅋北出毋臧貨水𤅋南出利家圈居宇西南貴吉圈居宇正北富圈居宇正東方敗圈居宇東南有寵不終迣圈居宇西北宜子與囷居宇西北㔷不利囷居宇東南㔷不盈不利室囷居宇西南㔷吉囷居宇東北㔷吉井當戶牖間富井居西南㔷其君不𤵸必窮井居西北㔷必絕後廡居東方鄉井日出炙其其後必肉食取婦為小內內居西南婦不媚於君內居西北毋子內居東北吉內居正東吉內居南不畜當祠室依道為小內不宜子圂居西北㔷利豬不利人圂居正北吉圂居東北妻善病圂居南宜犬多惡言屏居宇後吉屏居宇前不吉門欲當宇隋吉門出衡不吉小宮大門貧大宮小門女子喜宮斲入里門之右不吉詰詰咎鬼害民罔行為民不羊告如詰之召道令民毋麗兇央鬼之所惡彼窋卧箕坐連行奇立人毋故鬼攻之不已是是刺鬼以桃為弓牡棘為矢羽之雞羽見而射之則已矣人毋故鬼昔其宮是是丘鬼取故丘之土以為偽人犬置蘠上五步一人一犬睘其宮鬼來陽灰𣪠箕以喿之則止人毋故而鬼惑之是鬼善戲人以桑心為丈鬼來而𣪠之畏是死矣人毋故而鬼取為膠是是哀鬼毋家與人為徒令人色柏然毋氣喜契清不飲食以棘椎桃秉以其心則不來一宅中毋故而室人皆疫或死或病是是棘鬼在焉正立而貍其上旱則淳水則乾屈而去之則止矣一宅之中毋故室人皆疫多瞢米未死是是鬼貍焉其上毋草如席處屈而去之則止矣人毋故一室人皆疫或死或病丈夫女子隋須羸髮黃目是宲宲人生為鬼以沙人一升𢯶其舂臼以黍肉食宲人則止矣犬恒夜入人室執丈夫戲女子不可得也是神狗偽為鬼以桑皮為之烰而食之則止矣夏大暑室毋故而寒幼蠪處之取牡棘烰室中蠪去矣野獸若六畜逢人而言是票風之氣𣪠以桃丈繹而投之則已矣竈毋故不可以孰食陽鬼取其氣燔豕矢室中則止矣人之六畜毋故而皆死欦鬼之氣入焉乃疾瓦以還已矣寒風入人室獨也它人莫為洒以沙則已矣鳥獸能言是夭也不過三言言過三多益其旁人則止矣毋氣之徒而𣦟終日大事也不終日小事也殺蟲豸斷而能屬者濆以灰則不屬矣人有思哀也弗忘取丘下之莠完掇其葉二七東北鄉如之乃卧則止矣人妻妾若朋友死其鬼歸之者以莎芾牡棘枋熱以寺之則不來矣人毋故而心悲也以桂長尺有尊而中折以望之日日始出而食之已乃則止矣故丘鬼恒畏人畏人所為芻矢以鳶之則不畏人矣鬼恒召人曰壐必以𦳑月日死是鬼偽為鼠入人醯醬滫將中求而去之則已矣大神其所不可咼也善害人以犬矢為完操以咼之見其神以投之不害人矣鬼恒夜鼓人門以歌若哭人見之是兇鬼鳶以芻矢則不來矣人若鳥獸及六畜恒行人宮是上神相好下樂入男女未入宮者𣪠鼓奮鐸喿之則不來矣鬼恒從男女見它人而去是神蟲偽為人以良劍刺其頸則不來矣一室人皆毋氣以息不能童作是狀神在其室屈遝泉有赤豕馬尾犬首享而食之美氣一室人皆夙筋是會蟲居其室西臂取西南隅去地五尺以鐵椎椯之必中蟲首屈而去之弗去不出三年一室皆夙筋鬼恒責人不可辭是鬼以牡棘之劍之則不來矣鬼恒為人惡瞢䁷而弗占是圖夫為桑丈奇戶內復鬴戶外不來矣鬼恒從人游不可以辭取女筆以拓之則不來矣女子不狂癡歌以生商是陽鬼樂從之以北鄉之辨二七燔以灰食食之鬼去人毋故而鬼祠其宮不可去是祖游以犬矢投之不來矣鬼恒羸入人宮是幼殤死不葬以灰濆之則不來矣鬼恒逆人入人宮是游鬼以廣灌為䳒以燔之則不來矣人生子未能行而死恒然是不辜鬼處之以庚日日始出時濆門以灰卒有祭十日收祭裹以白茅貍野則毋央矣人毋故而憂也為桃更而敃之以癸日日入投之道遽曰某免於憂矣人毋故而弩也以戊日日中而食黍於道遽則止矣人毋故室皆傷是粲迓之鬼處之取白茅及黃土而西之周其室則去矣鬼入人宮室勿見而亡亡已以脩康寺其來也沃之則止矣人毋故而撟若虫及須是是恙氣處之乃𠦪屨以紙即止矣凡鬼恒執匴以入人室曰氣我食云是是餓鬼以屨投之則止矣凡有大票風害人擇屨以投之則止矣人恒亡赤子是水亡傷取之乃為灰室而牢之縣以䓛則得矣刊之以䓛則死矣享而食之不害矣凡邦中之立叢其鬼恒夜謼焉是遽鬼執人以自伐也乃解衣弗袵入而傅者之可得也乃一室中卧者眯也不可以居是鬼居之取桃枱椯四隅中央以牡棘刀刊其宮蘠謼之曰復疾趣出今日不出以牡刀皮而衣則毋央矣大袜恒入人室不可止以桃更𣪠之則止矣鬼恒召人出宮是是遽鬼毋所居罔謼其召以白石投之則止矣鬼嬰兒恒為人號曰鼠我食是哀乳之鬼其骨有在外者以黃土濆之則已矣一室中卧者容席以臽是地辥居之注白湯以黃土窒不害矣人毋故而鬼有鼠是夭鬼以水沃之則已矣狼恒謼人門曰啟吾非鬼也殺而享食之有美味一室中有鼓音不見其鼓是鬼鼓以人鼓應之則已矣有眾虫襲入人室是野火偽為虫以人火應之則已矣鬼恒宋㑥人是不辜鬼以牡棘之劍刺之則止矣鬼恒襄人之畜是暴鬼以芻矢鳶之則止矣鬼恒從人女與居曰上帝子下游欲去自浴以犬矢𣪠以葦則死矣鬼恒胃人鼠我而女不可辭是上神下取妻𣪠以葦則死矣弗御五來女子死矣天火燔人宮不可御以白沙救之則止矣到雷焚人不可止以人火鄉之則已矣雷攻人以其木𣪠之則已矣雲氣襲人之宮以人火鄉之則止矣人過于丘虛女鼠抱子逐人張傘以鄉之則已矣人行而鬼當道以立解髮奮以過之則已矣鳥獸恒鳴人之室燔𧎌及六畜毛邋其止所則止矣人卧而鬼夜屈其頭以若便𣪠之則已矣鳥獸虫豸甚眾獨入一人室以若便𣪠之則止矣人毋故一室人皆箠延爰母處其室大如杵赤白其居所水則乾旱則淳屈其室中三尺燔豕矢焉則止矣一室人皆養𦡊癘鬼居之燔生桐其室中則已矣一室井血而星臭地蟲斲于下血上屚以沙墊之更為井食之以噴飲以爽路三日乃能人矣若不三月食之若傅之而非人也必枯骨也旦而最之苞以白茅果以賁而遠去之則止矣票風入人宮而有取焉乃投以屨得其所取盎之中道若弗得乃棄其屨於中道則亡恙矣不出壹歲家必有恙正月日七夕九二月日八夕八三月日九夕七四月日十夕六五月日十一夕五六月日十夕六七月日九夕七八月日八夕八九月日七夕九十月日六夕十十一月日五夕十一十二月日六夕十盗者子鼠也盗者兌口希須善弄手黑色面有黑子焉疵在耳臧於垣內中糞蔡下多鼠鼷孔午郢丑牛也盗者大鼻長頸大辟臑而僂疵在目臧牛廄中草木下多徐善䟊以未寅虎也盗者壯希須面有黑焉不全於身從以上辟臑梗大疵在辟臧於瓦器閒旦閉夕啟西方多虎豻貙豹申卯兔也盗者大面頭𩔂疵在鼻臧於草中旦閉夕啟北方多兔陘突垣義酉辰盗者男子青赤色為人不轂要有疵臧東南反下車人親也勿言已多𤣓不圖射亥戌巳蟲也盗者長而黑蛇目黃色疵在足臧於瓦器下名西茞亥旦午鹿也盗者長頸小胻其身不全長耳而操蔡疵在肩臧於草木下必依阪險旦啟夕閉東方名徹達祿得獲錯未馬也盗者長須耳為人我我然好歌無疵在肩臧於芻稾中阪險必得名建章丑吉申環也盗者園面其為人也鞞鞞然夙得莫不得名責環貉豺干都寅酉水也盗者𤔔而黃色疵在面臧於園中草下旦啟夕閉夙得莫不得名多酉起嬰戌老羊也盗者赤色其為人也剛履疵在頰臧於糞蔡中土中夙得莫不得名馬童龏思辰戌亥豕也盗者大鼻而票行馬脊其面不全疵在臧於圂中垣下夙得莫不得名豚孤夏穀亥甲盗名曰耤鄭壬強當良乙名曰舍徐可不𧦋亡𢝊丙名曰䪛可癸上丁名曰浮妾榮辨僕上戊名曰匽為勝己名曰宜食成怪目庚名曰甲郢相衛魚辛名曰秦桃乙忌慧壬名曰黑疾齊諈癸名曰陽生先智丙子女也有死其後必以子死其咎在渡衖丑鼠也其後必有病者三人寅罔也其咎在四室外有火敬卯會眾其後必有子將弟也死有外喪辰樹也其後必有敬有言見其咎在五室馬牛巳翼也其後必有別不皆居咎在惡室午室四也其後必有死者三人其咎在六室必有死者二人未也其室寡申石也其咎在二室生子不牷酉巫也其後必有小子死不出三月有得戌就也其咎在室馬牛豕也日中死兇亥死必三人其咎在三室甲辰寅死必復有死甲子死室氐男子死不出卒歲必有大女子死禹須臾辛亥辛巳甲子乙丑乙未壬申壬寅癸卯庚戌庚辰莫市以行有九喜癸亥癸巳丙子丙午丁丑丁未乙酉乙卯甲寅甲申壬戌壬辰日中以行有五喜己亥己巳癸丑癸未庚申庚寅辛酉辛卯戊戌戊辰壬午市日以行有七喜丙寅丙申丁酉丁卯甲戌甲辰乙亥乙巳戊午己丑己未莫食以行有三喜戊申戊寅己酉己卯丙戌丙辰丁亥丁巳庚子庚午辛丑辛未旦以行有二喜春三月甲乙不可以殺天所以張生時夏三月丙丁不可以殺天所以張生時秋三月庚辛不可以殺天所以張生時冬三月壬癸不可以殺天所以張生時此皆不可殺小殺小央大殺大央直此日月者不出金勝木火勝金水勝火土勝水木勝土東方木南方火西方金北方水中央土入正月二日一日心入二月九日直心入三月七日直心入四月旬五日心入五月旬二日心入六月旬心入七月八日心入八月五日心入九月三日心入十月朔日心入十一月二旬五日心入十二月二日三日心久行毋以庚午入室行毋以戌亥入丁卯不可以船行六壬不可以船行六庚不可以行正月七日二月十四日三月廿一日四月八日五月十六日六月廿四日七月九日八月十八日九月廿七日十月十日十一月廿日十二月卅日是日在行不可以歸在室不可以行是是大兇正月乙丑二月丙寅三月甲子四月乙丑五月丙寅六月甲子七月乙丑八月丙寅九月甲子十月乙丑十一月丙寅十二月甲子以以行從遠行歸是謂出亡歸死之日也行到邦門困禹步三勉壹步謼皋敢告曰某行毋咎先為禹除道即五畫地掓其畫中央土而懷之衣良日丁丑丁巳丁未丁亥辛未辛巳辛丑乙丑乙酉乙巳辛巳癸巳辛丑癸酉乙丑巳酉辛巳丑酉丁巳丑吉丁丑材衣媚人入十月十日乙酉十一月丁酉材衣終身衣絲十月丁酉材衣不卒歲必衣絲衣忌癸亥戊申己未壬申丁亥癸丑寅申亥戊巳癸甲己卯辛卯癸卯丁戊己申六月己未不可以裚新衣必死己戊壬癸丙申丁亥必鼠死者癸丑寅申亥秋丙庚辛材衣必入之五月六月不可為複衣月不盡五日不可材衣衣丁酉裚衣常以西有以東行以坐而飲酉矢兵不入于身身不傷衣良日乙丑巳酉辛巳丑酉吉丁丑材衣媚人入七月七日日乙酉十一月丁酉材衣終身衣絲十月丁酉材衣不卒歲必衣絲衣忌日己戊壬癸丙申丁亥必鼠死者癸丑寅申亥秋丙庚辛材衣必入之五月六月不可為複衣月不盡五日不可材衣丁酉材衣常以西有以東行以坐而飲酉矢兵不入于身身不傷入月六日刺七日刺八日刺二旬二日刺旬六日毀祠史先龍丙望以甲子寅辰東徙死丙子寅辰南徙死庚子寅辰西徙死壬子寅辰北徙死子卯午酉不可入寄者及臣妾必代居室久行毋以庚午入室長行毋以戌亥遠去室丁卯不可以船行六壬不可以船行六庚不可以行土忌土良日癸巳乙巳甲戌凡有土事必果土忌日戊己及癸酉癸未庚申丁未凡有土事弗果居正月寅二月巳三月未申四月亥五月卯六月午七月酉八月子九月辰十月未十一月戌十二月丑當其地不可起土攻正月亥二月酉三月未四月寅五月子六月戌七月巳八月卯九月丑十月申十一月午十二月辰是胃土神毋起土攻凶春三月戊辰己巳夏三月戊申己未秋三月戊戌己亥冬三月戊寅己丑是胃地衝不可為土攻春之乙亥夏之丁亥秋之辛亥冬之癸亥是胃牝日百事不吉以起土攻有女喪正月乙卯四月丙午七月辛酉十月壬子是胃召䍃合日不可垣凶正月申四月寅六月巳十月亥是胃地杓神以毀宮毋起土攻凶月中旬毋起北南陳垣及矰之大凶四月丙午是胃召䍃合日不可垣凶四月酉以壞垣凶入月十七日以毀垣其家日減春三月毋起東鄉室夏三月毋起南鄉室秋三月毋起西鄉室冬三月毋起北鄉室以此起室大凶必有死者冬三月之日勿以筑室及波地是胃發蟄門入月七日及冬未春戌夏丑秋辰是胃四敫不可初穿門為戶牖伐木壞垣起垣徹屋及殺大凶利為嗇夫丁亥不可為戶天李正月居子二月居子卯三月居午四月居酉五月居子六月居卯七月居午八月居酉九月居子十月居卯十一月居午十二月居辰酉凡此日不可入官及入室入室必烕入官必有罪壬申會癸酉天以壞高山不可取婦正月不可垣神以治室田亳主以乙巳死杜主以乙酉死雨帀以辛未死田大人以癸亥死田忌丁亥戊戌不可初田及興土攻五種忌丙及寅禾甲及子麥乙巳及丑黍辰麻卯及戌叔亥稻不可以始種及穫賞其歲或弗食反枳子丑朔六月反枳寅卯朔五日反枳辰巳朔四日反枳午未朔三日反支申酉朔二日反枳戌亥朔一日反枳復卒其日子有復反枳一月當有三反枳毋以子丑傅戶墨日利壞垣徹屋出寄者毋歌朔日利入室毋哭望利為囷倉馬禖祝曰先牧日丙馬禖合神東鄉南鄉各一馬中土以為馬禖穿壁直中中三腏四廄行大夫先㪇兕席今日良日肥豚清酒美白粱到主君所主君笱屏詷馬敺其央去其不羊令其耆耆飲律律弗御自行弗敺自出令其鼻能糗鄉令耳悤目明令頭為身衡為身剛脚為身尾善敺腹為百草囊四足善行主君勉飲勉食吾歲不敢忘
